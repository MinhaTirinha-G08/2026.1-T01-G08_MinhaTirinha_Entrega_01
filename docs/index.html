<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>MinhaTirinha | Documentação Oficial</title> 
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentação do Projeto MinhaTirinha - Grupo 08">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* Ajuste para a logo não ficar colada no topo */
    .sidebar .sidebar-nav {
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div id="app">Carregando documentação...</div>
  
  <script>
    window.$docsify = {
      name: 'MinhaTirinha - G08',
      repo: 'https://github.com/Marjoriemitzi/2026.1-T01-G08_MinhaTirinha_Entrega_01',
      
      // Configurações da Sidebar
      loadSidebar: true,    // Ativa o arquivo _sidebar.md
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md' // Garante que a sidebar apareça em subpastas

      subMaxLevel: 3,       // Mostra os títulos (## e ###) no menu lateral
      
      // Configurações de Navegação
      auto2top: true,       // Rola para o topo ao trocar de página
      mergeNavbar: true,    // Junta a navbar com a sidebar em telas pequenas
      formatUpdated: '{DD}/{MM} {HH}:{mm}',
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

  <script>mermaid.initialize({ startOnLoad: true });</script>
